<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SATS QUIZ | Learn & Earn Bitcoin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --primary: #f7931a; /* Bitcoin Orange */
            --primary-hover: #e08215;
            --secondary: #5865f2; /* Discord Blue */
            --secondary-hover: #4752c4;
            --border: #333333;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
        }

        h1 { font-weight: 700; font-size: 2.2rem; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            margin-bottom: 15px;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-discord {
            background-color: var(--secondary);
            color: white;
        }
        .btn-discord:hover { background-color: var(--secondary-hover); }

        .btn-ln {
            background-color: #ffffff;
            color: #000000;
        }
        .btn-ln:hover { background-color: #e0e0e0; }

        .btn-quiz {
            background-color: var(--primary);
            color: black;
            margin-top: 20px;
        }
        .btn-quiz:hover { background-color: var(--primary-hover); }

        .divider {
            color: var(--text-muted);
            margin: 20px 0;
            display: flex;
            align-items: center;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
            margin: 0 10px;
        }

        /* Quiz Form Styling */
        #quizForm { text-align: left; }
        .question { margin-bottom: 25px; }
        .question p { font-weight: 600; margin-bottom: 10px; color: var(--text-main); }
        .option {
            display: block;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .option:hover { background-color: rgba(255,255,255,0.1); }
        .option input { margin-right: 12px; }

        .hidden { display: none !important; }

        /* Lightning Icon SVG */
        .icon-ln { width: 18px; height: 18px; fill: #000000; }
        /* Discord Icon SVG */
        .icon-discord { width: 20px; height: 20px; fill: #ffffff; }

    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h1 style="color: var(--primary);">⚡ SATS QUIZ</h1>
        <p class="subtitle">Authenticate to start the challenge and earn Sats.</p>

        <button class="btn btn-discord" onclick="window.location.href='/api/auth/discord'">
            <svg class="icon-discord" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21a105.73,105.73,0,0,0,32.11,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14C129.24,52.84,124.39,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.12-12.67,11.41-12.67S54,46,53.86,53,48.74,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.41-12.67S96.08,46,96.08,53,91,65.69,84.69,65.69Z"/></svg>
            Verify with Discord
        </button>

        <div class="divider">OR</div>

        <button class="btn btn-ln" onclick="initiateLNVerify()">
            <svg class="icon-ln" viewBox="0 0 24 24"><path d="M12.876 0L2 14.881h7.828L7.828 24 18.704 9.119h-7.828L12.876 0z"/></svg>
            Verify with Lightning
        </button>
    </div>

    <div id="quiz-section" class="card hidden">
        <h1>General Knowledge Quiz</h1>
        <p class="subtitle">Answer correctly to secure your sats. Score 80%+ to win!</p>
        
        <form id="quizForm">
            <div class="question">
                <p>1. What is the maximum supply of Bitcoin?</p>
                <label class="option"><input type="radio" name="q1" value="21m" required> 21 Million</label>
                <label class="option"><input type="radio" name="q1" value="unlimited"> Unlimited</label>
                <label class="option"><input type="radio" name="q1" value="100m"> 100 Million</label>
            </div>

            <div class="question">
                <p>2. The smallest unit of Bitcoin is called a:</p>
                <label class="option"><input type="radio" name="q2" value="milli"> Milli-BTC</label>
                <label class="option"><input type="radio" name="q2" value="satoshi" required> Satoshi</label>
                <label class="option"><input type="radio" name="q2" value="bit"> Bit</label>
            </div>

            <button type="submit" class="btn btn-quiz">Submit Answers & Claim Reward</button>
        </form>
    </div>

    <script>
        // -- Authentication & UI State --
        // In your real Flask app, you will check for a session cookie or JWT here.
        // If the URL contains `?authenticated=true`, we show the quiz.
        const urlParams = new URLSearchParams(window.location.search);
        const isAuthenticated = urlParams.get('authenticated') === 'true'; 

        if (isAuthenticated) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
        }

        // -- LN Verify Placeholder --
        function initiateLNVerify() {
            // Replace this with your backend call to generate a LNURL-Auth QR.
            alert("LNURL-Auth logic placeholder:\nYour backend needs to generate a challenge and display a QR code here.");
        }

        // -- Quiz Submission --
        document.getElementById('quizForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const answers = {
                q1: formData.get('q1'),
                q2: formData.get('q2')
            };

            console.log("Submitting answers to backend:", answers);
            alert("Submitting to backend `/api/submit` for grading and payout...");
            
            // Real implementation:
            // await fetch('/api/submit', {
            //     method: 'POST',
            //     headers: {'Content-Type': 'application/json'},
            //     body: JSON.stringify(answers)
            // });
        });
    </script>
</body>
</html>
