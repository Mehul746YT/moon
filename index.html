<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Dutton Ranch</title>

<meta name="description"
content="Welcome to The Dutton Ranch Discord.">


<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Georgia, serif;
}


html{
  background:#18130d;
  color:white;
}


body{
  min-height:100vh;
}


/* Header */

header{
  padding:25px;
}


nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}


.brand{
  color:white;
  text-decoration:none;
  font-size:28px;
  font-weight:bold;
}


/* Theme button */

button{

  padding:10px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:#b58a4a;
  color:white;

}



/* Hero */

.hero{

height:80vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

}


.hero h1{

font-size:55px;

margin-bottom:20px;

}


.hero p{

max-width:600px;

font-size:20px;

opacity:.8;

line-height:1.5;

}



/* Discord button */

.join{

margin-top:30px;

display:inline-block;

background:#b58a4a;

color:white;

padding:15px 35px;

border-radius:30px;

text-decoration:none;

font-size:18px;

transition:.2s;

}


.join:hover{

transform:scale(1.05);

}



/* Light theme */

.light{

background:#f2e7d0;

color:#25170d;

}


.light .brand{

color:#25170d;

}


</style>

</head>


<body>


<header>

<nav>


<a class="brand">

🌵 The Dutton Ranch

</a>



<button onclick="toggleTheme()">

Theme

</button>


</nav>

</header>



<section class="hero">


<h1>

Welcome to The Dutton Ranch

</h1>



<p>

A place for ranch stories, adventures, community, and good conversations.

</p>



<a class="join"

href="https://discord.gg/XatbESvgj6"

target="_blank">

Join Discord

</a>


</section>



<script>


function toggleTheme(){

document.documentElement.classList.toggle("light");

}


</script>



</body>

</html>
